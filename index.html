<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Controle - Oficina Mecânica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'dark-bg': '#0f172a',
              'dark-secondary': '#1e293b',
              'dark-card': '#293548',
              'border-color': '#334155',
              'text-light': '#f8fafc',
              'text-gray': '#94a3b8',
              'blue-primary': '#3b82f6',
            },
            keyframes: {
              'modal-slide-up': {
                '0%': { transform: 'translateY(20px) scale(0.98)', opacity: '0' },
                '100%': { transform: 'translateY(0) scale(1)', opacity: '1' },
              },
              'toast-in': {
                '0%': { transform: 'translateX(100%)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
               'alert-pulse': {
                '0%': { boxShadow: '0 0 0 0 rgba(239, 68, 68, 0.7)' },
                '70%': { boxShadow: '0 0 0 8px rgba(239, 68, 68, 0)' },
                '100%': { boxShadow: '0 0 0 0 rgba(239, 68, 68, 0)' },
              }
            },
            animation: {
              'modal-slide-up': 'modal-slide-up 0.3s ease-out',
              'toast-in': 'toast-in 0.3s ease-out forwards',
              'alert-pulse': 'alert-pulse 1.5s infinite',
            }
          },
        },
      }
    </script>
    <!-- Script para lidar com roteamento SPA em subdiretórios (GitHub Pages) -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-dark-bg text-text-light font-sans antialiased">
    <div id="root"></div>
    <!-- O caminho /index.tsx é o padrão que o Vite reconhece para build -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
